grafana:
  adminPassword: admin

prometheus:
  prometheusSpec:
    retention: 30d
    retentionSize: 32GB
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 35Gi
    resources:
      limits:
        memory: 512Mi
      requests:
        memory: 256Mi
