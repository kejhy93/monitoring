grafana:
  adminPassword: admin
  additionalDataSources:
    - name: Loki
      type: loki
      url: http://loki:3100
      access: proxy

prometheus:
  prometheusSpec:
    retention: 30d
    retentionSize: 32GiB
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 35Gi
    resources:
      limits:
        memory: 512Mi
      requests:
        memory: 256Mi
